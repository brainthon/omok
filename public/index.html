<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomoku Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>

<body>
    <!-- SPA 화면 1: 메인 ホーム (초기 화면) -->
    <div id="home-screen" class="screen-container active">
        <div class="glass-panel home-content"
            style="padding: 20px; border-radius: 30px; border: 4px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.6);">
            <img src="/assets/cute_gomoku_title.png" alt="Online Gomoku Title" class="title-image"
                style="max-width: 800px; width: 100%; box-shadow: none; margin-bottom: 20px;">
            <div class="home-actions" style="flex-direction: row; justify-content: center; gap: 30px; margin-top: 0;">
                <button id="btn-mode-single" class="send-btn main-btn"
                    style="background: linear-gradient(to bottom, #74b9ff, #0984e3); border: 3px solid white; box-shadow: 0 6px 20px rgba(9, 132, 227, 0.4); border-radius: 20px; padding: 20px 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;">
                    <span style="font-size: 1.5rem; font-weight: bold; white-space: nowrap;">🤖 싱글 플레이</span>
                    <span style="font-size: 0.9rem; opacity: 0.9; font-weight: normal; white-space: nowrap;">(AI와
                        대결하세요)</span>
                </button>
                <button id="btn-mode-multi" class="send-btn main-btn accent-btn"
                    style="background: linear-gradient(to bottom, #ffb142, #ff7f50); border: 3px solid white; box-shadow: 0 6px 20px rgba(255, 127, 80, 0.4); border-radius: 20px; padding: 20px 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;">
                    <span style="font-size: 1.5rem; font-weight: bold; white-space: nowrap;">🎮 온라인 대전</span>
                    <span style="font-size: 0.9rem; opacity: 0.9; font-weight: normal; white-space: nowrap;">(다른 플레이어와
                        2V2 대전)</span>
                </button>
            </div>
        </div>
    </div>

    <!-- SPA 화면 2: 멀티플레이 로비 (대시보드) -->
    <div id="lobby-screen" class="screen-container hidden">
        <div class="glass-panel lobby-content">
            <header class="lobby-header">
                <h2>멀티플레이 로비</h2>
                <div class="user-info">
                    <span id="global-users-display"
                        style="margin-right: 15px; font-weight: bold; color: var(--accent);">🟢 현재 접속자: 1명</span>
                    <span id="lobby-nickname-display">Guest</span>
                    <button id="btn-lobby-back" class="danger-btn small-btn">뒤로 가기</button>
                </div>
            </header>

            <div class="lobby-actions">
                <button id="btn-create-room" class="send-btn main-btn accent-btn">새 게임 방 만들기</button>
                <button id="btn-refresh-rooms" class="send-btn main-btn outline-btn">새로고침</button>
            </div>

            <div class="room-list-container">
                <h3>진행 중인 방 목록</h3>
                <div id="room-list" class="room-list">
                    <!-- 방 목록 아이템들이 동적으로 추가됨 -->
                    <p class="empty-msg">개설된 방이 없습니다. 새 방을 만들어보세요!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- SPA 화면 3: 실제 게임 화면 (기존 layout-container) -->
    <div id="game-screen" class="screen-container hidden">
        <div class="layout-container">
            <!-- 왼쪽: 오목 게임 보드 영역 -->
            <main class="board-section">
                <div class="glass-panel board-wrapper">
                    <div class="status-bar">
                        <div id="player-indicator" class="player-tag">대기 중...</div>
                        <div id="turn-indicator" class="turn-tag">상대방을 기다리는 중</div>
                    </div>
                    <!-- PixiJS 캔버스가 삽입될 컨테이너 -->
                    <div id="game-canvas-container"></div>
                </div>
            </main>

            <!-- 오른쪽: 실시간 채팅 및 정보 영역 -->
            <aside class="chat-sidebar">
                <div class="glass-panel chat-wrapper">
                    <header class="chat-header">
                        <h2>로비 채팅</h2>
                        <span class="online-dot"></span>
                    </header>
                    <div class="chat-messages" id="chat-messages">
                        <!-- 메시지들이 여기에 동적으로 추가됩니다 -->
                    </div>
                    <form class="chat-input-area" id="chat-form">
                        <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." autocomplete="off">
                        <button type="submit" class="send-btn">전송</button>
                    </form>
                </div>
            </aside>
        </div>
    </div>

    <!-- 모달(Modal) 오버레이 레이아웃 -->
    <!-- 0. 닉네임 입력 모달 (온라인 대전 클릭 시 팝업) -->
    <div id="nickname-modal" class="modal-overlay hidden">
        <div class="glass-panel modal-content">
            <h2>오목 넥서스 입장</h2>
            <p>사용하실 애칭(닉네임)을 입력해주세요.</p>
            <form id="nickname-form">
                <input type="text" id="nickname-input" placeholder="애칭 입력..." required autocomplete="off"
                    maxlength="12">
                <div class="modal-actions horizontal">
                    <button type="button" id="btn-nickname-cancel" class="send-btn modal-btn danger-btn">취소</button>
                    <button type="submit" class="send-btn modal-btn">로비 입장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 2. 매칭 완료 시 준비 확인 모달 -->
    <div id="ready-modal" class="modal-overlay hidden">
        <div class="glass-panel modal-content">
            <h2>매칭 완료!</h2>
            <p>상대방이 입장했습니다. <br>게임을 시작하시려면 아래 버튼을 눌러주세요.</p>
            <div class="modal-actions horizontal">
                <button id="btn-ready-cancel" class="send-btn modal-btn danger-btn">나가기</button>
                <button id="btn-ready" class="send-btn modal-btn">준비 완료 (Ready!)</button>
            </div>
            <p id="ready-status-text" style="margin-top: 15px; font-size: 0.9em; color: var(--text-muted);"></p>
        </div>
    </div>

    <!-- 3. 게임 오버 모달 -->
    <div id="game-over-modal" class="modal-overlay hidden">
        <div class="glass-panel modal-content">
            <h2 id="winner-text">게임 종료!</h2>
            <p id="winner-subtext">누군가 승리했습니다.</p>
            <div class="modal-actions">
                <button id="btn-play-again" class="send-btn modal-btn">재대결 (준비하기)</button>
                <button id="btn-exit" class="send-btn modal-btn danger-btn">나가기</button>
            </div>
            <p id="play-again-status-text" style="margin-top: 15px; font-size: 0.9em; color: var(--text-muted);">
            </p>
        </div>
    </div>

    <!-- 4. 방 만들기 모달 -->
    <div id="create-room-modal" class="modal-overlay hidden">
        <div class="glass-panel modal-content" style="width: 400px; max-width: 90%;">
            <h2>새 게임 방 만들기</h2>
            <p>방 제목을 지정하고 비공개 여부를 선택하세요.</p>
            <form id="create-room-form">
                <input type="text" id="room-name-input" placeholder="방 제목 입력..." required autocomplete="off"
                    maxlength="20" style="font-size: 1.1em; padding: 12px; width: 100%; box-sizing: border-box;">

                <div style="display: flex; align-items: center; margin-top: 15px; gap: 10px;">
                    <label class="toggle-switch">
                        <input type="checkbox" id="private-room-toggle">
                        <span class="slider"></span>
                    </label>
                    <span style="font-weight: bold; color: var(--text-main);">비공개 방 (비밀번호 설정)</span>
                </div>

                <div id="password-input-container" style="display: none; margin-top: 10px;">
                    <input type="password" id="room-password-input" placeholder="비밀번호 입력 (최대 10자리)" autocomplete="off"
                        maxlength="10" style="font-size: 1.1em; padding: 12px; width: 100%; box-sizing: border-box;">
                </div>

                <div class="modal-actions horizontal" style="margin-top: 25px;">
                    <button type="button" id="btn-create-room-cancel" class="send-btn modal-btn danger-btn">취소</button>
                    <button type="submit" class="send-btn modal-btn">방 개설하기</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/client.js"></script>
</body>

</html>
